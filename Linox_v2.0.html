<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Linox Terminal v2.0</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/front/css/Linox_v2.0.css">
    </head>
    <body>

    <canvas id="matrix-canvas"></canvas>
    <div class="scanline"></div>
    <div class="os-wrapper">

    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="os-logo">LINOX</span>
            <span class="os-version">v2.0.0</span>
        </div>
        <div class="topbar-center">
            <div class="sys-stats">
                <span class="stat"><span class="stat-label">CPU</span><span class="stat-bar"><span class="stat-fill" id="cpu-fill"></span></span><span class="stat-val" id="cpu-val">--</span></span>
                <span class="stat"><span class="stat-label">MEM</span><span class="stat-bar"><span class="stat-fill" id="mem-fill"></span></span><span class="stat-val" id="mem-val">--</span></span>
                <span class="stat"><span class="stat-label">NET</span><span class="stat-val" id="net-val">↑0 ↓0</span></span>
            </div>
        </div>
        <div class="topbar-right">
            <span class="clock" id="clock">00:00:00</span>
            <span class="topbar-sep">|</span>
            <span class="uptime-label">UP <span id="uptime">0s</span></span>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">

        <!-- Left Sidebar: File Tree -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">EXPLORER</span>
                <button class="sidebar-toggle-btn" id="sidebar-close">×</button>
            </div>
            <div class="file-tree" id="file-tree"></div>
        </div>

        <!-- Terminal Area -->
        <div class="terminal-area" id="terminal-area">

            <!-- Tab Bar -->
            <div class="tab-bar">
                <div class="tabs" id="tabs-container"></div>
                <div class="tab-actions">
                    <button class="tab-btn" id="new-tab-btn" title="New Tab (Ctrl+T)">+</button>
                    <button class="tab-btn" id="toggle-sidebar-btn" title="Toggle Explorer">⊞</button>
                    <button class="tab-btn" id="toggle-ssh-btn" title="SSH Sim">⌁</button>
                </div>
            </div>

            <!-- Terminals -->
            <div class="terminals-wrapper" id="terminals-wrapper"></di></div>

            <!-- Right Panel: Info/SSH -->
            <div class="info-panel" id="info-panel" style="display:none;">
                <div class="panel-header">
                    <span id="panel-title">SSH SESSION</span>
                    <button class="sidebar-toggle-btn" id="panel-close">×</button>
                </div>
                <div id="panel-content"></div>
            </div>

        </div>

        <!-- Status Bar -->
        <div class="statusbar">
            <div class="status-left">
                <span class="status-item" id="status-mode">NORMAL</span>
                <span class="status-sep">›</span>
                <span class="status-item" id="status-path">~</span>
            </div>
            <div class="status-right">
                <span class="status-item" id="status-pyodide">Python: Loading...</span>
                <span class="status-sep">|</span>
                <span class="status-item">UTF-8</span>
                <span class="status-sep">|</span>
                <span class="status-item" id="status-branch">⎇ main</span>
            </div>
        </div>
    </div>

    <!-- VIM Modal -->
    <div class="vim-overlay" id="vim-overlay" style="display:none;">
        <div class="vim-editor">
            <div class="vim-header">
                <span class="vim-filename" id="vim-filename">untitled</span>
                <span class="vim-mode" id="vim-mode-label">NORMAL</span>
            </div>
            <div class="vim-content-wrap">
                <div class="vim-line-nums" id="vim-line-nums"></div>
                <textarea class="vim-textarea" id="vim-textarea" spellcheck="false"></textarea>
            </div>
                <div class="vim-statusline">
                    <span id="vim-status-msg">-- Press i to INSERT, :wq to save & quit, :q! to quit --</span>
                    <span id="vim-cursor-pos">1,1</span>
                </div>
            <div class="vim-cmd-line" id="vim-cmd-line" style="display:none;">
                <span>:</span><input id="vim-cmd-input" spellcheck="false">
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="cmd-tooltip" id="cmd-tooltip" style="display:none;"></div>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="/front/javascript/Linox_v2.0.js"></script>
    </body>
</html>
